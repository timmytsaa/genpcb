# 共同設定——模型差異一律放 model_*.yaml，不放這裡
seed: 17

paths:
  experiments: experiments
  data_root: data            # 資料引擎輸出（docs/data-engine.md）

sft:
  dataset: data/sft/boards.jsonl   # D-sft：Phase 1 資料引擎產出
  epochs: 2
  lr: 1.0e-5
  per_device_batch: 4
  grad_accum: 8
  val_frac: 0.1                    # 以 netlist 為單位切（防洩漏，data-engine.md §3）
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 3

grpo:
  group_size: 16
  steps: 2000
  lr: 5.0e-7
  kl_coeff: 0.001
  max_new_tokens: 4096
  audit_every_steps: 50      # 真值 audit 週期（100% 非同步驗證另有產線）
