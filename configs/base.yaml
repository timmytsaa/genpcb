# 共同設定——模型差異一律放 model_*.yaml，不放這裡
seed: 17

paths:
  experiments: experiments
  data_root: data            # 資料引擎輸出（docs/data-engine.md）

sft:
  dataset: data/sft/boards.jsonl   # D-sft：Phase 1 資料引擎產出
  epochs: 2
  lr: 1.0e-5
  per_device_batch: 4
  grad_accum: 8
  val_frac: 0.1                    # 以 netlist 為單位切（防洩漏，data-engine.md §3）
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 3

# Tier-1 確定性 placement reward 權重（docs/placement-routing-checker.md §2.1）
# 硬違規（overlap/bounds）權重遠大於連續項，使其主導
reward:
  w_overlap: 8.0     # courtyard 重疊面積比（硬）
  w_bounds: 8.0      # 板框越界（硬）
  w_hpwl: 1.0        # 正規化 HPWL（連續）
  w_rudy: 0.0        # RUDY 峰值未校準/無界 → 暫不入 reward（仍算出供 audit），校準後再開
  w_decap: 0.5       # decoupling cap 距 IC（領域規則）
  rudy_bins: 32

grpo:
  group_size: 8              # num_generations（每 prompt 生幾個，Colab 友善）
  n_prompts: 512             # 程序化 prompt 數（GRPO 自生 completion，不需標籤）
  max_steps: 200             # 煙霧測試規模
  lr: 1.0e-6                 # GRPO 用遠小於 SFT 的 lr
  beta: 0.001                # KL 係數
  parse_fail: -10.0          # malformed floor；GRPO 用較小幅度，避免 group 標準化壓掉品質訊號
  max_prompt_length: 1024
  max_completion_length: 512
  audit_every_steps: 50      # 真值 audit 週期（需 KiCad routing reward，本期未啟用）
